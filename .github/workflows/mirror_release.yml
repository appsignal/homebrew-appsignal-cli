name: Mirror appsignal-cli release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to mirror, with or without the leading v
        required: true
        type: string

permissions:
  contents: write

env:
  SOURCE_REPO: appsignal/appsignal-cli

jobs:
  mirror_release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Normalize version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download formula release assets from private repository
        env:
          GH_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ steps.version.outputs.tag }}" \
            --repo "$SOURCE_REPO" \
            --dir dist \
            --pattern "aarch64-unknown-linux-gnu.tar.gz" \
            --pattern "aarch64-apple-darwin.tar.gz" \
            --pattern "x86_64-unknown-linux-gnu.tar.gz" \
            --pattern "x86_64-apple-darwin.tar.gz"

      - name: Calculate SHA256 values
        id: shas
        run: |
          LINUX_ARM_SHA="$(sha256sum dist/aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)"
          ARM_SHA="$(sha256sum dist/aarch64-apple-darwin.tar.gz | cut -d' ' -f1)"
          LINUX_INTEL_SHA="$(sha256sum dist/x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)"
          INTEL_SHA="$(sha256sum dist/x86_64-apple-darwin.tar.gz | cut -d' ' -f1)"
          echo "linux_arm_sha=$LINUX_ARM_SHA" >> "$GITHUB_OUTPUT"
          echo "arm_sha=$ARM_SHA" >> "$GITHUB_OUTPUT"
          echo "linux_intel_sha=$LINUX_INTEL_SHA" >> "$GITHUB_OUTPUT"
          echo "intel_sha=$INTEL_SHA" >> "$GITHUB_OUTPUT"

      - name: Write checksum manifest
        run: |
          mkdir -p checksums
          cat > "checksums/${{ steps.version.outputs.tag }}.txt" <<EOF
          ${{ steps.shas.outputs.arm_sha }}  aarch64-apple-darwin.tar.gz
          ${{ steps.shas.outputs.intel_sha }}  x86_64-apple-darwin.tar.gz
          ${{ steps.shas.outputs.linux_arm_sha }}  aarch64-unknown-linux-gnu.tar.gz
          ${{ steps.shas.outputs.linux_intel_sha }}  x86_64-unknown-linux-gnu.tar.gz
          EOF

      - name: Create or update public release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.version.outputs.tag }}" \
              dist/aarch64-unknown-linux-gnu.tar.gz \
              dist/aarch64-apple-darwin.tar.gz \
              dist/x86_64-unknown-linux-gnu.tar.gz \
              dist/x86_64-apple-darwin.tar.gz \
              "checksums/${{ steps.version.outputs.tag }}.txt" \
              --clobber
          else
            gh release create "${{ steps.version.outputs.tag }}" \
              --title "${{ steps.version.outputs.version }}" \
              --notes "Mirrored release assets for the Homebrew formula." \
              dist/aarch64-unknown-linux-gnu.tar.gz \
              dist/aarch64-apple-darwin.tar.gz \
              dist/x86_64-unknown-linux-gnu.tar.gz \
              dist/x86_64-apple-darwin.tar.gz \
              "checksums/${{ steps.version.outputs.tag }}.txt"
          fi

      - name: Update formula
        run: |
          ruby script/write_formula \
            "${{ steps.version.outputs.version }}" \
            "${{ steps.shas.outputs.arm_sha }}" \
            "${{ steps.shas.outputs.intel_sha }}" \
            "${{ steps.shas.outputs.linux_arm_sha }}" \
            "${{ steps.shas.outputs.linux_intel_sha }}"

      - name: Commit formula update
        run: |
          if git diff --quiet -- Formula/appsignal-cli.rb checksums; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/appsignal-cli.rb
          git add "checksums/${{ steps.version.outputs.tag }}.txt"
          git commit -m "Update appsignal-cli formula to v${{ steps.version.outputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}"
